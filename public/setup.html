<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Set up your account — ReforgedZ</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<main class="shell">
  <form class="card" id="step1">
    <div class="brand">REFORGED<span class="z">Z</span><span class="sub">Account Setup</span></div>
    <h1 class="title">Welcome</h1>
    <p class="subtitle" id="lede">Set up your staff account. Pick a username, give us an email we'll verify, and choose a password.</p>
    <div class="error hidden" id="err1"></div>

    <div class="field">
      <label for="u">Username</label>
      <input class="input" id="u" autocomplete="username" required pattern="[A-Za-z0-9_.\-]{2,32}" placeholder="e.g. IRISH" />
    </div>
    <div class="field">
      <label for="email">Email (we'll send a 6-digit code)</label>
      <input class="input" id="email" type="email" autocomplete="email" required />
    </div>
    <div class="field">
      <label for="p1">Password</label>
      <input class="input" id="p1" type="password" autocomplete="new-password" minlength="8" required />
    </div>
    <div class="field">
      <label for="p2">Confirm password</label>
      <input class="input" id="p2" type="password" autocomplete="new-password" minlength="8" required />
    </div>
    <button class="btn block" id="submit1" type="submit">Send verification code</button>
  </form>

  <form class="card hidden" id="step2">
    <div class="brand">REFORGED<span class="z">Z</span><span class="sub">Verify Email</span></div>
    <h1 class="title">Confirm your email</h1>
    <p class="subtitle">We sent a 6-digit code to <strong id="hint"></strong>. Enter it to finish.</p>
    <div class="error hidden" id="err2"></div>
    <div class="field">
      <label for="code">6-digit code</label>
      <input class="input" id="code" inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="one-time-code" required style="text-align:center;letter-spacing:8px;font-size:1.3rem" />
    </div>
    <button class="btn block" id="submit2" type="submit">Finish setup</button>
    <a href="#" class="muted-link" id="resend">Didn't get it? Resend code</a>
  </form>
</main>
<script>
const params = new URLSearchParams(location.search);
const invite = params.get("invite");
let challengeId = null;

const $ = (id) => document.getElementById(id);
function showErr(el, msg) { el.textContent = msg; el.classList.remove("hidden"); }
function clearErr(el) { el.classList.add("hidden"); }

async function init() {
  if (!invite) {
    showErr($("err1"), "Missing or invalid invite link.");
    $("submit1").disabled = true;
    return;
  }
  const r = await fetch("/api/password/token-info?invite=" + encodeURIComponent(invite));
  if (!r.ok) {
    const d = await r.json().catch(() => ({}));
    const map = {
      invalid_or_expired: "This invite link is invalid or expired. Ask your manager for a new one.",
      already_used: "This invite has already been used.",
      expired: "This invite has expired. Ask your manager for a new one."
    };
    showErr($("err1"), map[d.error] || "Could not verify invite.");
    $("submit1").disabled = true;
    return;
  }
  const data = await r.json();
  if (data.label) $("lede").textContent += " (Invitation: " + data.label + ")";
}
init();

$("step1").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErr($("err1"));
  const p1 = $("p1").value;
  const p2 = $("p2").value;
  if (p1 !== p2) return showErr($("err1"), "Passwords do not match.");
  if (p1.length < 8) return showErr($("err1"), "Password must be at least 8 characters.");
  $("submit1").disabled = true;
  try {
    const r = await fetch("/api/password/invite/redeem", {
      method: "POST",
      headers: { "content-type": "application/json" },
      credentials: "include",
      body: JSON.stringify({
        invite,
        username: $("u").value.trim(),
        email: $("email").value.trim(),
        password: p1
      })
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      const map = {
        invalid_username: "Username must be 2-32 chars, letters/digits/._- only.",
        username_taken: "That username is already in use. Pick another.",
        email_required: "A valid email is required.",
        password_too_short: "Password must be at least 8 characters.",
        password_too_long: "Password is too long.",
        invalid_or_expired: "This invite link is invalid or expired.",
        rate_limited: "Too many attempts. Try again in a minute.",
        mail_send_failed: "Could not send the verification email. Try again."
      };
      showErr($("err1"), map[data.error] || "Could not create your account.");
      $("submit1").disabled = false;
      return;
    }
    challengeId = data.challengeId;
    $("hint").textContent = data.emailHint || $("email").value.trim();
    $("step1").classList.add("hidden");
    $("step2").classList.remove("hidden");
    $("code").focus();
  } catch {
    showErr($("err1"), "Network error.");
    $("submit1").disabled = false;
  }
});

$("step2").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErr($("err2"));
  $("submit2").disabled = true;
  try {
    const r = await fetch("/api/auth/2fa/verify", {
      method: "POST",
      headers: { "content-type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ challengeId, code: $("code").value.trim() })
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      const reason = data.reason || data.error;
      const map = {
        wrong_code: "Code is incorrect.",
        expired: "Code expired.",
        already_used: "This code was already used.",
        too_many_attempts: "Too many failed attempts. Request a new code.",
        invalid_challenge: "This setup attempt expired. Start over."
      };
      let msg = map[reason] || "Verification failed.";
      if (typeof data.attemptsRemaining === "number") msg += ` (${data.attemptsRemaining} attempts left)`;
      showErr($("err2"), msg);
      $("submit2").disabled = false;
      return;
    }
    location.href = "/account";
  } catch {
    showErr($("err2"), "Network error.");
    $("submit2").disabled = false;
  }
});

$("resend").addEventListener("click", async (e) => {
  e.preventDefault();
  const r = await fetch("/api/auth/2fa/resend", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ challengeId })
  });
  const data = await r.json().catch(() => ({}));
  if (r.ok) {
    challengeId = data.challengeId;
    $("hint").textContent = data.emailHint || $("email").value.trim();
  }
});
</script>
</body>
</html>
